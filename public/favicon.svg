<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">

  <!-- Teal rounded background -->
  <rect width="512" height="512" rx="80" fill="#1A5C6B"/>

  <!-- OPEN DOOR MARK — warm white -->
  <!-- The bottom edge of the outer rect IS the threshold. No separate line added. -->

  <!-- Outer surround -->
  <rect x="96" y="80" width="320" height="368"
        stroke="#F7F4EE" stroke-width="22" fill="none"/>

  <!-- Inner door opening — left jamb, head, right jamb. Open at bottom. -->
  <line x1="164" y1="448" x2="164" y2="172"
        stroke="#F7F4EE" stroke-width="20" stroke-linecap="square"/>
  <line x1="164" y1="172" x2="348" y2="172"
        stroke="#F7F4EE" stroke-width="20" stroke-linecap="square"/>
  <line x1="348" y1="172" x2="348" y2="448"
        stroke="#F7F4EE" stroke-width="20" stroke-linecap="square"/>

  <!-- Amber dot — centred on the bottom edge of the outer frame (y=448) -->
  <circle cx="256" cy="448" r="24" fill="#E8952A"/>

</svg>
